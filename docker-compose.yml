services:
  zookeeper:
    image: wurstmeister/zookeeper
    restart: unless-stopped
    volumes:
      - zookeeper-data:/data
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/2181'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  kafka:
    image: wurstmeister/kafka
    command: ["start-kafka.sh"]
    restart: unless-stopped
    environment:
      KAFKA_CREATE_TOPICS: "events:1:1"
      KAFKA_LISTENERS: PLAINTEXT://:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
    volumes:
      - kafka-data:/kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/9092'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  mysql:
    image: mysql:8
    restart: unless-stopped
    environment:
      MYSQL_RANDOM_ROOT_PASSWORD: "1"
      MYSQL_DATABASE: "todo"
      MYSQL_USER: "todo_user"
      MYSQL_PASSWORD: "todo_pass"
    volumes:
      - my-db:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "todo_user", "-ptodo_pass"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 20s

  receiver:
    build:
      context: ./receiver
      dockerfile: Dockerfile
    restart: on-failure
    depends_on:
      kafka:
        condition: service_healthy
 
    volumes:
      - ./config:/config
      - ./logs:/logs
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.create_connection(('localhost', 8080), 2); s.close()"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    deploy: #L12
      replicas: 3

  storage:
    build:
      context: ./storage
      dockerfile: Dockerfile
    restart: on-failure
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
    volumes:
      - ./config:/config
      - ./logs:/logs
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.create_connection(('localhost', 8090), 2); s.close()"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  processing:
    build:
      context: ./processing
      dockerfile: Dockerfile
    restart: on-failure
    depends_on:
      storage:
        condition: service_healthy
    environment: #L12
      CORS_ALLOW_ALL: "no"
    volumes:
      - ./config:/config
      - ./logs:/logs
      - ./data/processing:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.create_connection(('localhost', 8100), 2); s.close()"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  analyzer:
    build:
      context: ./analyzer
      dockerfile: Dockerfile
    restart: on-failure
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      CORS_ALLOW_ALL: "no"
    volumes:
      - ./config:/config
      - ./logs:/logs
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.create_connection(('localhost', 8110), 2); s.close()"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  health:
    build:
      context: ./health
      dockerfile: Dockerfile
    restart: on-failure
    depends_on:
      receiver:
        condition: service_started
      storage:
        condition: service_started
      processing:
        condition: service_started
      analyzer:
        condition: service_started
    environment: #L12
      CORS_ALLOW_ALL: "no"
    volumes:
      - ./config:/config
      - ./logs:/logs
      - ./data/health:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.create_connection(('localhost', 8120), 2); s.close()"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  stats:
    build:
      context: ./stats
      dockerfile: Dockerfile
    restart: on-failure
    depends_on:
      receiver:
        condition: service_started
      storage:
        condition: service_started
    environment: 
      CORS_ALLOW_ALL: "no"
    volumes:
      - ./config:/config
      - ./logs:/logs
      - ./data/stats:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.create_connection(('localhost', 8130), 2); s.close()"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  dashboard:
    build:
      context: ./dashboard-ui
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      processing:
        condition: service_healthy
      analyzer:
        condition: service_healthy
      health:
        condition: service_healthy
  nginx: #L12: nginx service, removed ports from other services
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      dashboard:
        condition: service_started
      receiver:
        condition: service_started
      storage:
        condition: service_started
      processing:
        condition: service_started
      analyzer:
        condition: service_started
      health:
        condition: service_started
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  my-db:
  kafka-data:
  zookeeper-data: