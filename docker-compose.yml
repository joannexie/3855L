services:
  zookeeper:
    image: wurstmeister/zookeeper
    restart: unless-stopped
    volumes:
      - zookeeper-data:/data
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/2181'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  kafka:
    image: wurstmeister/kafka
    command: ["start-kafka.sh"]
    restart: unless-stopped
    environment:
      KAFKA_CREATE_TOPICS: "events:1:1"
      KAFKA_LISTENERS: PLAINTEXT://:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
    volumes:
      - kafka-data:/kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/9092'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  mysql:
    image: mysql:8
    restart: unless-stopped
    environment:
      MYSQL_RANDOM_ROOT_PASSWORD: "1"
      MYSQL_DATABASE: "todo"
      MYSQL_USER: "todo_user"
      MYSQL_PASSWORD: "todo_pass"
    volumes:
      - my-db:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "todo_user", "-ptodo_pass"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 20s

  receiver:
    build:
      context: ./receiver
      dockerfile: Dockerfile
    restart: on-failure
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"
    volumes:
      - ./config:/config
      - ./logs:/logs
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.create_connection(('localhost', 8080), 2); s.close()"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  storage:
    build:
      context: ./storage
      dockerfile: Dockerfile
    restart: on-failure
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
    volumes:
      - ./config:/config
      - ./logs:/logs
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.create_connection(('localhost', 8090), 2); s.close()"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  processing:
    build:
      context: ./processing
      dockerfile: Dockerfile
    restart: on-failure
    depends_on:
      storage:
        condition: service_healthy
    ports:
      - "8100:8100"
    volumes:
      - ./config:/config
      - ./logs:/logs
      - ./data/processing:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.create_connection(('localhost', 8100), 2); s.close()"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  analyzer:
    build:
      context: ./analyzer
      dockerfile: Dockerfile
    restart: on-failure
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8110:8110"
    volumes:
      - ./config:/config
      - ./logs:/logs
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.create_connection(('localhost', 8110), 2); s.close()"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  dashboard:
    build:
      context: ./dashboard-ui
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      processing:
        condition: service_healthy
      analyzer:
        condition: service_healthy
    ports:
      - "3000:80"

volumes:
  my-db:
  kafka-data:
  zookeeper-data: