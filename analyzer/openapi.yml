openapi: 3.0.3

info:
  title: Analyzer API
  version: "1.0.0"
  description: >
    Reads events from Kafka and returns event history by type and index, plus queue statistics.

servers:
  - url: /

paths:
  /health:
    get:
      summary: Health check
      operationId: app.health
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /stats:
    get:
      summary: gets the event stats
      operationId: app.get_event_stats
      responses:
        '200':
          description: sucessfully returned the storage stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Stats"
  /todo/checklist-items:
    get:
      summary: Get a checklist-item event by index
      description: >
        Returns the checklist-item event at the given 0-based index (counting only checklist-item events
        inside the mixed Kafka queue).
      operationId: app.get_event1
      parameters:
        - name: index
          in: query
          required: true
          description: 0-based index within checklist-item events
          schema:
            type: integer
            minimum: 0
           
      responses:
        "200":
          description: Event found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyzerEvent"
        "400":
          description: Invalid input
          
        "404":
          description: No event at that index
          

  /todo/checklist-summaries:
    get:
      summary: Get a checklist-summary event by index
      description: >
        Returns the checklist-summary event at the given 0-based index (counting only checklist-summary events
        inside the mixed Kafka queue).
      operationId: app.get_event2
      parameters:
        - name: index
          in: query
          required: true
          description: 0-based index within checklist-summary events
          schema:
            type: integer
            minimum: 0
            
      responses:
        "200":
          description: Event found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyzerEvent"
        "400":
          description: Invalid input
          
        "404":
          description: No event at that index
          
  /stats:
    get:
      summary: Get current event counts in the Kafka queue
      operationId: app.get_stats
      responses:
        "200":
          description: Statistics returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Stats"

components:
  schemas:
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: Analyzer is healthy
    Stats:
      type: object
      required:
        - num_temp
        - num_precip
      properties:
        num_temp:
          type: integer
          example: 100
        num_precip:
          type: integer
          example: 100
    AnalyzerEvent:
      type: object
      required:
        - type
        - datetime
        - payload
      properties:
        type:
          type: string
          description: Kafka event type
          
        datetime:
          type: string
          description: When the event was created
          
        payload:
          type: object
          description: The event payload (contents depend on your event schema)
          additionalProperties: true

    Stats:
      type: object
      required:
        - num_event1
        - num_event2
        - last_updated
      properties:
        num_event1:
          type: integer
        num_event2:
          type: integer
        last_updated:
          type: string
          format: date-time