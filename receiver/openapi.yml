openapi: 3.0.3
info:
  title: To-Do Checklist API
  version: "1.0.0"
  description: This API receives to-do checklist batch events from users.

paths:
  /health: # A1: health check endpoint
    get:
      summary: Health check
      operationId: app.health
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /stats:
    get:
      summary: checks the status of the receiver
      operationId: app.get_stats
      description: service is okay if this endpoint returns a response
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status_datetime:
                    type: string
                    format: date-time
                    example: 2025-12-12 9:35:34

  /todo/checklist-items:
    post:
      summary: Reports a batch of checklist item events
      operationId: app.report_checklist_item_events
      description: Adds a batch of checklist items that were completed throughout the day.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChecklistItemBatch'
      responses:
        '201':
          description: batch successfully received
        '400':
          description: invalid input, object invalid

  /todo/checklist-summaries:
    post:
      summary: Reports a batch of checklist summary events
      operationId: app.report_checklist_summary_events
      description: Adds a batch of checklist summaries generated periodically.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChecklistSummaryBatch'
      responses:
        '201':
          description: batch successfully received
        '400':
          description: invalid input, object invalid

components:
  schemas:
    HealthResponse: # A1: health check response schema
      type: object
      properties:
        status:
          type: string
          example: Receiver is healthy
    Stats:
      type: object
      properties:
        status_datetime:
          type: string
          format: date-time
          example: 2025-12-12 9:35:34
          
    ChecklistItemBatch:
      type: object
      required:
        - sender_id
        - sent_timestamp
        - list_name
        - items
      properties:
        sender_id:
          type: string
          format: uuid
          
        sent_timestamp:
          type: string
          format: date-time
          
        list_name:
          type: string
          
        items:
          type: array # multi items in 1 reqest
          items:
            $ref: '#/components/schemas/ChecklistItem'

    ChecklistItem:
      type: object
      required:
        - item_name
        - completed
        - completed_at
        - estimated_mins
      properties:
        item_name:
          type: string
          
        completed:
          type: boolean
          
        completed_at:
          type: string
          format: date-time
        
        estimated_mins:
          type: integer
          

    ChecklistSummaryBatch:
      type: object
      required:
        - sender_id
        - sent_timestamp
        - list_name
        - summaries
      properties:
        sender_id:
          type: string
          format: uuid
          
        sent_timestamp:
          type: string
          format: date-time
          
        list_name:
          type: string
          
        summaries:
          type: array
          items:
            $ref: '#/components/schemas/ChecklistSummary'

    ChecklistSummary:
      type: object
      required:
        - items_completed
        - items_total
        - summary_at
      properties:
        items_completed:
          type: integer
          
        items_total:
          type: integer
          
        summary_at:
          type: string
          format: date-time
          

