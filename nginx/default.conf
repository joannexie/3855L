server {
    listen 80;
    server_name _;

    # Dashboard UI is the default page
    location / {
        proxy_pass http://dashboard:80;
    }

    # Receiver service
    location /receiver {
        proxy_pass http://receiver:8080;
    }

    # Storage service
    location /storage {
        proxy_pass http://storage:8090;
    }

    # Processing service
    location /processing {
        proxy_pass http://processing:8100;
    }

    # Analyzer service
    location /analyzer {
        proxy_pass http://analyzer:8110;
    }

    # Health service
    location /health {
        proxy_pass http://health:8120;
    }
}